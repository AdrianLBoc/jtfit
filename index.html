<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTFit</title>
    <link rel="icon" href="./favicon.ico"/>
    <link rel="stylesheet" href="./styles.css"/>
  </head>
  <body>
    <div class="container">
      <h1>Hi, I'm Jack Tarango</h1>
      <p>I lift weights n stuff. Pay me to get buff.</p>
      
      <a href="https://venmo.com/Jack-Tarango-1" class="button" target="_blank">Send Me Money</a>

      <div class="dropdown">
        <button class="dropdown-button" onclick="toggleDropdown()">Fun fact about me</button>
        <div id="dropdown-content" class="dropdown-content">
          I can't walk past a mirror without flexing.
        </div>
      </div>
    </div>

    <script>
      function toggleDropdown() {
        const content = document.getElementById("dropdown-content");
        if (content.style.display === "block") {
          content.style.display = "none";
        } else {
          content.style.display = "block";
        }
      }
    </script>
